<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Stock Price Analyzer — Interactive technical analysis of stock prices">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b1208"/>
      <stop offset="0.55" stop-color="#9a3412"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#fed7aa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: candlesticks + rising trend line -->
  <g transform="translate(980,190)" stroke="#fed7aa" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- rising trend line -->
    <polyline points="-95,55 -50,20 -10,30 35,-25 80,-55"/>
    <!-- arrow head -->
    <polyline points="55,-55 80,-55 80,-30"/>
    <!-- candlestick 1 -->
    <line x1="-70" y1="38" x2="-70" y2="78"/>
    <rect x="-82" y="48" width="24" height="22" rx="3"/>
    <!-- candlestick 2 -->
    <line x1="-15" y1="20" x2="-15" y2="60"/>
    <rect x="-27" y="28" width="24" height="26" rx="3"/>
    <!-- candlestick 3 -->
    <line x1="45" y1="-18" x2="45" y2="40"/>
    <rect x="33" y="-6" width="24" height="34" rx="3"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#ffffff">Stock Price Analyzer</text>
  <text x="84" y="226" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#fed7aa">Interactive technical analysis · Streamlit</text>
  <text x="84" y="284" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#fff7ed">Fetch, chart and compare stock prices with moving averages.</text>
  <text x="84" y="320" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#fdba74">python · streamlit · yfinance · pandas · matplotlib · seaborn</text>
</svg>
